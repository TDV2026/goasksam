<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoAskSam</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; height: 100dvh; display: flex; flex-direction: column; }
  #header { padding: 14px 20px; background: #fff; border-bottom: 1px solid #e8e8e4; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .av { width: 30px; height: 30px; border-radius: 50%; background: #185FA5; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: #fff; flex-shrink: 0; }
  .av-user { background: #555; }
  #header h1 { font-size: 16px; font-weight: 600; color: #1a1a1a; }
  #header p { font-size: 11px; color: #888; }
  #msgs { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 20px; max-width: 720px; width: 100%; margin: 0 auto; }
  .row { display: flex; gap: 10px; align-items: flex-start; }
  .row.user { flex-direction: row-reverse; }
  .msg-wrap { display: flex; flex-direction: column; gap: 10px; max-width: 90%; }
  .row.user .msg-wrap { align-items: flex-end; max-width: 75%; }
  .lbl { font-size: 11px; color: #aaa; padding: 0 2px; }
  .bubble { padding: 13px 17px; border-radius: 18px; font-size: 14px; line-height: 1.65; }
  .bubble.sam { background: #fff; color: #1a1a1a; border-bottom-left-radius: 4px; border: 1px solid #e8e8e4; }
  .bubble.user { background: #185FA5; color: #fff; border-bottom-right-radius: 4px; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { padding: 8px 16px; border-radius: 20px; border: 1px solid #d0d0cc; background: #fff; font-size: 13px; color: #333; cursor: pointer; transition: all 0.12s; }
  .chip:hover { border-color: #185FA5; color: #185FA5; background: #f0f6ff; }
  .typing-bubble { background: #fff; border: 1px solid #e8e8e4; border-radius: 18px; border-bottom-left-radius: 4px; padding: 14px 18px; display: inline-flex; gap: 5px; align-items: center; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #bbb; animation: pulse 1.4s ease-in-out infinite; }
  .dot:nth-child(2) { animation-delay: .2s; }
  .dot:nth-child(3) { animation-delay: .4s; }
  @keyframes pulse { 0%,80%,100%{opacity:.3} 40%{opacity:1} }
  .results-wrap { display: flex; flex-direction: column; gap: 10px; width: 100%; }
  .card-hero { background: #fff; border: 1.5px solid #1a1a1a; border-radius: 16px; overflow: hidden; }
  .card-hero-label { background: #1a1a1a; color: #fff; font-size: 10px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; padding: 8px 16px; }
  .card-hero-img { width: 100%; height: 210px; object-fit: cover; display: block; background: #eee; }
  .card-hero-body { padding: 14px 16px 0; }
  .card-hero-title { font-size: 17px; font-weight: 700; color: #1a1a1a; }
  .card-hero-meta { font-size: 12px; color: #999; margin-top: 3px; }
  .card-hero-price-row { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 12px; }
  .price-wrap { display: flex; flex-direction: column; }
  .price-lbl { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 0.4px; }
  .price-val { font-size: 22px; font-weight: 700; color: #1a1a1a; }
  .badges { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .badge { font-size: 11px; padding: 3px 9px; border-radius: 99px; font-weight: 500; }
  .badge-live { background: #e6f4d7; color: #2d6a0f; }
  .badge-reserve { background: #f3f4f6; color: #666; }
  .badge-noreserve { background: #f0fdf4; color: #166534; }
  .badge-rnm { background: #fef3e2; color: #9a6000; }
  .update-ticker { margin: 10px 16px 0; background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px; padding: 8px 12px; display: flex; gap: 8px; align-items: flex-start; }
  .update-dot { width: 7px; height: 7px; border-radius: 50%; background: #f59e0b; flex-shrink: 0; margin-top: 4px; animation: blink-dot 2s ease-in-out infinite; }
  @keyframes blink-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .update-text { font-size: 12px; color: #92400e; line-height: 1.5; }
  .update-time { font-size: 11px; color: #b45309; font-weight: 600; }
  .card-hero-actions { display: flex; gap: 10px; padding: 12px 16px 14px; margin-top: 12px; border-top: 1px solid #f0f0ee; }
  .btn-ghost { flex: 1; padding: 10px; background: #fff; color: #1a1a1a; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-ghost:hover { background: #f5f5f3; }
  .alt-cards { display: flex; flex-direction: column; gap: 8px; }
  .card-alt { background: #fff; border: 1px solid #e8e8e4; border-radius: 12px; overflow: hidden; display: flex; }
  .card-alt-img { width: 100px; height: 80px; object-fit: cover; flex-shrink: 0; background: #eee; }
  .card-alt-body { padding: 10px 12px; flex: 1; display: flex; flex-direction: column; justify-content: space-between; min-width: 0; }
  .card-alt-label { font-size: 10px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
  .card-alt-label.caution { color: #c2410c; }
  .card-alt-title { font-size: 13px; font-weight: 700; color: #1a1a1a; line-height: 1.3; margin-top: 1px; }
  .card-alt-reason { font-size: 12px; color: #666; margin-top: 3px; line-height: 1.35; }
  .card-alt-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; }
  .card-alt-price { font-size: 13px; font-weight: 700; color: #1a1a1a; }
  .card-alt-action { font-size: 12px; color: #185FA5; font-weight: 600; cursor: pointer; background: none; border: none; padding: 0; white-space: nowrap; }
  .rnm-section { border-top: 1px dashed #e0e0dc; padding-top: 10px; }
  .rnm-label { font-size: 10px; color: #bbb; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .card-rnm { background: #fafaf8; border: 1px solid #eee; border-radius: 8px; padding: 10px 12px; display: flex; justify-content: space-between; align-items: center; }
  .card-rnm-title { font-size: 12px; font-weight: 600; color: #777; }
  .card-rnm-sub { font-size: 11px; color: #bbb; margin-top: 1px; }
  .card-rnm-right { font-size: 11px; color: #bbb; text-align: right; flex-shrink: 0; margin-left: 12px; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; display: flex; align-items: flex-end; justify-content: center; }
  .modal { background: #fff; border-radius: 20px 20px 0 0; width: 100%; max-width: 680px; max-height: 82vh; overflow-y: auto; padding: 20px 20px 36px; position: relative; }
  .modal-handle { width: 36px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 16px; }
  .modal-title { font-size: 17px; font-weight: 700; color: #1a1a1a; }
  .modal-sub { font-size: 12px; color: #999; margin-top: 2px; margin-bottom: 4px; }
  .modal-close { position: absolute; top: 16px; right: 16px; width: 28px; height: 28px; border-radius: 50%; background: #f0f0ee; border: none; font-size: 16px; cursor: pointer; color: #666; display: flex; align-items: center; justify-content: center; }
  .modal-reserve { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 99px; margin-bottom: 14px; margin-top: 6px; }
  .modal-reserve.active { background: #f3f4f6; color: #555; }
  .modal-reserve.noreserve { background: #f0fdf4; color: #166534; }
  .modal-reserve.rnm { background: #fef3e2; color: #9a6000; }
  .modal-view { font-size: 13px; color: #1a1a1a; line-height: 1.7; margin-bottom: 16px; padding: 12px 14px; background: #f9f9f7; border-radius: 10px; border-left: 3px solid #1a1a1a; }
  .modal-view-label { font-size: 10px; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; }
  .modal-section { margin-bottom: 14px; }
  .modal-section-label { font-size: 10px; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 5px; }
  .modal-section-text { font-size: 13px; color: #444; line-height: 1.65; }
  .modal-update { background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px; padding: 10px 12px; margin-bottom: 14px; font-size: 13px; color: #92400e; line-height: 1.5; }
  #bottom { padding: 12px 20px 18px; background: #fff; border-top: 1px solid #e8e8e4; flex-shrink: 0; }
  #bottom-inner { max-width: 720px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end; }
  #inp { flex: 1; border: 1px solid #ddd; border-radius: 22px; padding: 10px 18px; font-size: 14px; font-family: inherit; resize: none; outline: none; background: #f9f9f7; color: #1a1a1a; line-height: 1.5; max-height: 120px; }
  #inp:focus { border-color: #185FA5; background: #fff; }
  #btn { width: 36px; height: 36px; border-radius: 50%; border: none; background: #185FA5; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 18px; }
  #btn:hover { background: #0d4a87; }
  #btn:disabled { background: #ccc; cursor: default; }
</style>
</head>
<body>
<div id="header">
  <div class="av">S</div>
  <div><h1>GoAskSam</h1><p>Finding you your dream car</p></div>
</div>
<div id="msgs"></div>
<div id="bottom">
  <div id="bottom-inner">
    <textarea id="inp" rows="1" placeholder="What are you looking for?"></textarea>
    <button id="btn" aria-label="Send">↑</button>
  </div>
</div>
<script>
const LISTINGS = [
  {id:"L01",status:"live",year:1978,make:"Porsche",model:"911 SC Targa",type:"sports",trans:"manual",drive:"RWD",price:20000,reserve:true,miles:220300,loc:"Elma, WA",img:"https://media.carsandbids.com/cdn-cgi/image/width=2080,quality=70/4822e9034b0b6b357b3f73fabdfc10e586c36f68/photos/application/s-CixrIm_/edit/l3HoQ.jpg?t=177853174099",sam_view:"Long-term ownership since 1998 counts for something, and the $17k mechanical overhaul in 2024 was thorough. The undocumented engine rebuild is the sticking point — without paperwork on that, you're taking the seller's word for something that really matters. I'd want to dig into the comment thread and see how the community responded to the rebuild question before getting too excited.",what_i_like:"Long-term single ownership. Comprehensive recent mechanical work. Targa spec with Fuchs wheels is the right look.",watch:"Engine and trans rebuilt at 180k under prior ownership with no documentation kept. Smog unit present but not connected.",service:"2024: full brake, fuel, ignition, wiring overhaul — $17k spent.",market:"SC Targas with documented history trade $35-55k. The undocumented rebuild is why this is priced where it is.",reserve_status:"active",updates:[{time:"6 hours ago",text:"Seller addressed carburetor question in comments. Confirmed vacuum-to-mechanical conversion. Community appears satisfied with the explanation."}]},
  {id:"L02",status:"live",year:2007,make:"Hummer",model:"H3",type:"suv",trans:"automatic",drive:"4WD",price:3050,reserve:false,miles:139000,loc:"Great Neck, NY",img:"https://media.carsandbids.com/cdn-cgi/image/width=2080,quality=70/c88a6ba8af4c9a8e9d9fe78c40ad6708f5bae9a9/photos/exterior/r4oWzwBp-cOziaMx/edit/0t8D1.jpg?t=177940852144",sam_view:"No reserve and a clean Carfax is about as straightforward as these get. The service history is thin — oil changes only — but at this price point that's priced in. The underbody corrosion on a NY car is worth a look before bidding further.",what_i_like:"No reserve. Clean Carfax. Full-time 4WD with skid plates.",watch:"Oil changes only in Carfax. Underbody corrosion visible.",service:"Oil changes only per Carfax. Dealer acquired April 2026.",market:"H3s in better condition trade $4-8k. This is entry pricing.",reserve_status:"none",updates:[]},
  {id:"L03",status:"live",year:2013,make:"Audi",model:"S4 Manual",type:"sports",trans:"manual",drive:"AWD",price:10000,reserve:false,miles:83000,loc:"Pompano Beach, FL",img:"https://media.carsandbids.com/cdn-cgi/image/width=2080,quality=70/8666159a15ffd32049319e2dde0e1452e4fe28d1/photos/AudiS42013002.jpg?t=177913181045",sam_view:"Manual B8 S4 at $10k no reserve is the kind of listing worth paying attention to. The 6-year Carfax mileage gap is the question — seller explains it as a company car period, and the documentation they just uploaded seems to have satisfied the community. Based on what's been disclosed so far, this looks like a well-maintained example of a genuinely rare spec.",what_i_like:"Manual B8 S4 — rare. One owner from new. DSG, water pump, battery all done.",watch:"6-year Carfax mileage gap 2017-2023. Explanation is credible but worth verifying.",service:"1 owner since new. DSG x2, spark plugs, water pump, battery all done.",market:"Manual B8 S4s command a premium over autos. Autos trade $12-16k. $10k no reserve is strong value here.",reserve_status:"none",updates:[{time:"3 hours ago",text:"Seller uploaded additional Carfax documentation to address the mileage gap question. Community response has been positive."}]},
  {id:"L04",status:"live",year:2022,make:"Rivian",model:"R1T Launch Edition",type:"truck",trans:"automatic",drive:"AWD",price:45000,reserve:true,miles:57200,loc:"Santa Cruz, CA",img:"https://media.carsandbids.com/cdn-cgi/image/width=2080,quality=70/9004500a220bf3a3d455d15ee052cf8c332606f8/photos/K1BMpvqz-OVu2J5C/edit/zG4cp.jpg?t=177942111434",sam_view:"Launch Edition with the large pack is the desirable spec — this configuration is no longer orderable. The warranty work done before sale is actually a positive; known issues addressed. I'd want clarity on whether the Rivian warranty transfers before bidding seriously.",what_i_like:"Launch Edition large pack — sold-out spec. Known warranty items addressed before sale.",watch:"Warranty transferability to new owner not yet confirmed. Known reseller active in comments.",service:"Gen 2 subframe, tonneau cover, half-shaft boots, wheel hubs all replaced under Rivian warranty.",market:"R1T Launch Editions with large pack have been trading $42-52k. Reserve likely in that range.",reserve_status:"active",updates:[]},
  {id:"L05",status:"live",year:1993,make:"Volkswagen",model:"Cabriolet Classic Edition",type:"convertible",trans:"manual",drive:"FWD",price:4000,reserve:false,miles:141000,loc:"Crozet, VA",img:"https://media.carsandbids.com/cdn-cgi/image/width=2080,quality=70/ee7f173e46ec801a48d1673c50f9cebaa1bf2854/photos/exterior/9em7RgZ6-DhDRWoU/edit/XbXv6.jpg?t=177868798407",sam_view:"Classic Green Pearl on a last-year Cabriolet is a genuinely good color combination. The open concerns give me pause though — an inoperative coolant gauge means you're flying blind on engine temperature, and the KE-Jetronic fuel system has a reputation on these. I'd want those questions answered before bidding up from here.",what_i_like:"Rare Classic Green Pearl. Last-year spec. No reserve. Soft top replaced 2019.",watch:"Coolant gauge inoperative — no temperature monitoring. Oil warning light intermittent when hot. KE-Jetronic fuel system flagged by community.",service:"Top 2019, seats reupholstered 2025, timing belt 2011, clutch 2014.",market:"Clean Cabriolets in desirable colors trade $6-12k. These concerns are why it's priced below that.",reserve_status:"none",updates:[]},
  {id:"L06",status:"live",year:2020,make:"Land Rover",model:"Range Rover SVAutobiography Dynamic",type:"suv",trans:"automatic",drive:"AWD",price:40000,reserve:true,miles:33000,loc:"San Luis Obispo, CA",img:"https://media.carsandbids.com/cdn-cgi/image/width=2080,quality=70/da6e8a1d4896127a9d2adf83461993b45339474c/photos/application/s-_b78Pca/edit/FdNvu.jpg?t=177876856846",sam_view:"About as specced as a Range Rover gets — SVAutobiography Dynamic with the supercharged V8, 33k miles, California ownership. No mechanical concerns surfaced so far. Reserve is active and likely represents a significant gap from current bidding — this is early days for this auction.",what_i_like:"SVAutobiography Dynamic — pinnacle spec. 33k miles. California car. No concerns surfaced.",watch:"Reserve active and almost certainly well above current bid. Auction is early.",service:"Low miles. California car. Recent Land Rover dealer service.",market:"SVAutobiography Dynamic examples trade $65-85k retail. Auction is very early in the process.",reserve_status:"active",updates:[]},
  {id:"L07",status:"live",year:2015,make:"Porsche",model:"Cayman 981",type:"sports",trans:"manual",drive:"RWD",price:35000,reserve:true,miles:16700,loc:"Salem, OR",img:"https://media.carsandbids.com/cdn-cgi/image/width=2080,quality=70/c51905b0000b639a185eeb080dd879bf007f5604/photos/3oQw58xo-2PyUGXk/edit/hP0rA.jpg?t=177930231707",sam_view:"16,700 miles on a Guards Red manual 981 — that combination almost never comes up clean. The DME codes were concerning, but the seller has been responsive: new battery installed, cold start video posted, paint meters added to gallery. Based on what's been disclosed so far, this is looking like the more straightforward of the manual Porsches in the dataset. Reserve is still active, which is the main open question.",what_i_like:"16,700 miles — exceptional. Guards Red manual rarely surfaces. PASM, PPF, Bose. Paint meters confirm no prior bodywork.",watch:"Two DME codes — seller believes battery-related and codes have not reappeared. Reserve active, not yet met.",service:"PASM, Bose, heated/ventilated seats, PPF, CarPlay retrofit. Fresh battery and oil May 2026.",market:"Guards Red manual 981s at this mileage trade $42-55k. Reserve is the key unknown.",reserve_status:"active",updates:[{time:"2 hours ago",text:"Seller posted cold start video. Engine starts cleanly, no smoke. DME codes have not reappeared since battery replacement."},{time:"Yesterday",text:"Paint meter readings added to gallery. All panels consistent — no prior bodywork detected."}]},
  {id:"L08",status:"live",year:2008,make:"Toyota",model:"Sequoia Platinum 4x4",type:"suv",trans:"automatic",drive:"4WD",price:9100,reserve:false,miles:96000,loc:"Yonkers, NY",img:"https://media.carsandbids.com/cdn-cgi/image/width=2080,quality=70/7a0a3c6148108c9c64425dd85e0181fa3cccb652/photos/application/s-Az_3Gml/edit/EmqkI.jpg?t=177891456185",sam_view:"5.7L V8 Sequoia Platinum with locking center diff at $9,100 no reserve is drawing real interest. The rust and exhaust leak are northeastern realities that need pricing in, but the platform is strong and 96k miles is reasonable for this generation.",what_i_like:"5.7L V8 with locking center diff. No reserve. 96k miles is under average for this gen.",watch:"Exhaust leak not repaired. Northeastern underside rust visible. Two Carfax incidents.",service:"Rear brakes 2021. LED upgrades.",market:"Sequoia Platinums in cleaner condition trade $14-20k. Rust and exhaust explain the discount.",reserve_status:"none",updates:[]},
  {id:"L09",status:"live",year:2020,make:"Subaru",model:"WRX STI",type:"sports",trans:"manual",drive:"AWD",price:25000,reserve:false,miles:9700,loc:"Arizona",img:"https://media.carsandbids.com/cdn-cgi/image/width=2080,quality=70/abd2a7f0535314882a8c78d2ed08e7b8869f7367/photos/SubaruWRX2020002.jpg?t=177911430862",sam_view:"9,700 miles on a tuned STI with a dyno sheet from a reputable tuner is a genuinely unusual find. The seller is transparent about everything including the stealth switch. Whether this is interesting depends on your state's smog situation and your appetite for a modified car — for the right buyer, this is a compelling spec.",what_i_like:"9,700 total miles. Tuned to 468whp by Clark Turner — reputable name. No reserve. Full documentation.",watch:"Heavily modified — smog compliance varies by state. Stealth switch for rear lights (off-road only per seller).",service:"Clark Turner tune on E95. Full bolt-on list. Fresh Motul 300v oil.",market:"Low-mile tuned STIs with documented builds are rare. Stock 2020 STIs trade $28-35k.",reserve_status:"none",updates:[{time:"5 hours ago",text:"Dyno sheet uploaded confirming 468whp on E95. Full tuner notes and mod list now in gallery."}]},
  {id:"L10",status:"live",year:2020,make:"Nissan",model:"370Z Sport Touring",type:"sports",trans:"automatic",drive:"RWD",price:5580,reserve:true,miles:16600,loc:"Los Angeles, CA",img:"https://media.carsandbids.com/cdn-cgi/image/width=2080,quality=70/c51905b0000b639a185eeb080dd879bf007f5604/photos/exterior/3vAVEA0k-sCSR5pQ/edit/9L2LD.jpg?t=177930535574",sam_view:"Sport Touring spec with LSD, Bose, and 16,600 miles is a clean example of a car that doesn't get enough credit. Current bid is well below where these trade — reserve is unknown and will be the determining factor here.",what_i_like:"Sport Touring spec with LSD. 16,600 miles. Clean Carfax. LA car.",watch:"Reserve amount unknown. Dealer adds $125 in fees on top of final bid.",service:"Battery Dec 2025. Oil and fuel system service 2025. Clean Carfax.",market:"370Z Sport Touring automatics with low miles trade $18-24k. Current bid is well below that.",reserve_status:"active",updates:[]},
  {id:"L11",status:"live",year:2009,make:"BMW",model:"Z4 sDrive30i",type:"sports",trans:"manual",drive:"RWD",price:11000,reserve:true,miles:51200,loc:"Tampa, FL",img:"https://media.carsandbids.com/cdn-cgi/image/width=2080,quality=70/1477bbe21e8d6b5e719c7c3ccab577fd47dd8cc3/photos/exterior/36dd0nqW-ombFNpE/edit/ueIE5.jpg?t=177906875181",sam_view:"NA straight-six manual is the right spec on an E89 — this is the one worth buying if you want a Z4 driver. Coral red interior over black is a good combination. Tires need replacing immediately but otherwise no significant concerns have surfaced.",what_i_like:"NA straight-six manual — the right E89 spec. Power retractable hardtop. 51k miles. 2yr no-issue ownership.",watch:"2015 tires — need immediate replacement. Reserve active.",service:"Power retractable hardtop. Build sheet in gallery. Seller relocated Austin to Tampa.",market:"E89 Z4 sDrive30i manuals trade $12-18k. Fair money for this spec.",reserve_status:"active",updates:[]},

const SYS = `You are Sam — the smartest car friend the user has ever had. You work for GoAskSam, a live market intelligence platform for collector cars.

LISTINGS (with auction updates):
${JSON.stringify(LISTINGS)}

YOUR JOB IN ORDER:
1. Understand what the user wants
2. Tell them what you found and why — in plain language, like a friend
3. Then show cards

THE CRITICAL RULE:
Talk first. Recommend first. Cards follow your opinion.

CONVERSATION FLOW:
- Budget only ("under $50k", "around $30k") → ask what kind of car before anything else. Never show results on budget alone.
- Broad query ("I want a Porsche", "show me something fun") → ask ONE narrowing question. No cards.
- Semi-specific ("manual sports car under $50k") → one more question or go straight to results.
- Specific ("manual 981 Cayman under $50k") → recommend immediately then show cards.
- Max 3 questions total. After 3 exchanges Sam shows results even if still somewhat broad.
- If user seems frustrated or says "just show me" → show results immediately.
- Sam can always offer: "I can ask a couple more questions to narrow this down, or just show you what I have — which do you prefer?"

VOICE AND LANGUAGE:
Use phrases like: "Based on what's been disclosed so far..." / "Here's how I see it right now..." / "I'd want clarity on..." / "The safer choice is..." / "The more interesting gamble..."
Never say: "Most buyers should pass" / "Strong buy" / "I recommend" / strong absolutes.
Treat every auction as an evolving situation. New information may emerge.
Always surface reserve status — it is auction intelligence, not a footnote.

WHEN SHOWING RESULTS:
Start: "I found [N] [description]. Here's how I'd think about them."
Then 2-3 sentences of opinion — tradeoffs, what you'd watch, what you'd skip and why.
Then tags:
[HERO:id] — best current match (ONE only)
[ALT:id|Label|One-line tradeoff]
[RNM:id|Context] — reserve-not-met, visually separated

CHIPS: [CHIPS:Option 1|Option 2|Option 3] when asking clarifying questions.

TONE: Direct, warm, opinionated. 2-4 sentences before cards. No bullets in prose. No em dashes. No filler.

PRICING:
- Live: "currently bid to $X"
- Unsold: "bid to $X before reserve wasn't met"
- Sold: "sold for $X"

Never mention Claude or Anthropic.`;

const history = [];

function reserveInfo(l) {
  if (l.reserve_status === "none") return { label: "No Reserve", cls: "noreserve" };
  if (l.reserve_status === "rnm") return { label: "Reserve Not Met", cls: "rnm" };
  if (l.reserve_status === "sold") return { label: "Sold", cls: "noreserve" };
  return { label: "Reserve Active", cls: "active" };
}

function showTake(id) {
  const l = LISTINGS.find(x => x.id === id);
  if (!l) return;
  const ri = reserveInfo(l);
  const updateHTML = l.updates && l.updates.length
    ? `<div class="modal-update">🟡 <strong>${l.updates[0].time}:</strong> ${l.updates[0].text}</div>`
    : "";
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = `<div class="modal">
    <div class="modal-handle"></div>
    <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
    <div class="modal-title">${l.year} ${l.make} ${l.model}</div>
    <div class="modal-sub">${(l.miles||0).toLocaleString()} mi · ${l.trans||''} · ${l.loc}</div>
    <div class="modal-reserve ${ri.cls}">${ri.label}</div>
    ${updateHTML}
    <div class="modal-view">
      <div class="modal-view-label">Sam's Current View</div>
      ${l.sam_view}
    </div>
    <div class="modal-section">
      <div class="modal-section-label">What I Like</div>
      <div class="modal-section-text">${l.what_i_like}</div>
    </div>
    <div class="modal-section">
      <div class="modal-section-label">What I'd Watch</div>
      <div class="modal-section-text">${l.watch}</div>
    </div>
    <div class="modal-section">
      <div class="modal-section-label">Market Context</div>
      <div class="modal-section-text">${l.market}</div>
    </div>
  </div>`;
  overlay.addEventListener("click", e => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

function heroCard(l) {
  const ri = reserveInfo(l);
  const latestUpdate = l.updates && l.updates.length ? l.updates[0] : null;
  const updateHTML = latestUpdate
    ? `<div class="update-ticker"><div class="update-dot"></div><div class="update-text"><span class="update-time">${latestUpdate.time} —</span> ${latestUpdate.text}</div></div>`
    : "";
  return `<div class="card-hero">
    <div class="card-hero-label">Best Current Match</div>
    <img class="card-hero-img" src="${l.img}" alt="${l.year} ${l.make}" onerror="this.style.background='#ddd'">
    <div class="card-hero-body">
      <div class="card-hero-title">${l.year} ${l.make} ${l.model}</div>
      <div class="card-hero-meta">${l.miles.toLocaleString()} mi · ${l.trans} · ${l.loc}</div>
      <div class="card-hero-price-row">
        <div class="price-wrap">
          <span class="price-lbl">current bid</span>
          <span class="price-val">$${l.price.toLocaleString()}</span>
        </div>
        <div class="badges">
          <span class="badge badge-live">live</span>
          <span class="badge badge-${ri.cls === 'noreserve' ? 'noreserve' : 'reserve'}">${ri.label}</span>
        </div>
      </div>
    </div>
    ${updateHTML}
    <div class="card-hero-actions">
      <button class="btn-ghost" onclick="showTake('${l.id}')">Sam's Take</button>
    </div>
  </div>`;
}

function altCard(l, label, reason) {
  const isWarn = label.toLowerCase().includes("risk") || label.toLowerCase().includes("caution") || label.toLowerCase().includes("gamble");
  const priceLabel = l.status === "sold" ? "sold for" : l.status === "unsold" ? "bid to" : "current bid";
  return `<div class="card-alt">
    <img class="card-alt-img" src="${l.img}" alt="${l.year} ${l.make}" onerror="this.style.background='#ddd'">
    <div class="card-alt-body">
      <div class="card-alt-label ${isWarn ? 'caution' : ''}">${label}</div>
      <div class="card-alt-title">${l.year} ${l.make} ${l.model}</div>
      <div class="card-alt-reason">${reason}</div>
      <div class="card-alt-bottom">
        <span class="card-alt-price">${priceLabel} $${l.price.toLocaleString()}</span>
        <button class="card-alt-action" onclick="showTake('${l.id}')">Sam's Take →</button>
      </div>
    </div>
  </div>`;
}

function rnmCard(l, context) {
  return `<div class="card-rnm">
    <div>
      <div class="card-rnm-title">${l.year} ${l.make} ${l.model}</div>
      <div class="card-rnm-sub">${context}</div>
    </div>
    <div class="card-rnm-right">bid to $${l.price.toLocaleString()}<br>reserve not met</div>
  </div>`;
}

function parseResults(raw) {
  const heroMatch = raw.match(/\[HERO:(\w+)\]/);
  const altMatches = [...raw.matchAll(/\[ALT:(\w+)\|([^|]+)\|([^\]]+)\]/g)];
  const rnmMatches = [...raw.matchAll(/\[RNM:(\w+)\|([^\]]+)\]/g)];
  const chipMatch = raw.match(/\[CHIPS:(.*?)\]/);
  const heroListing = heroMatch ? LISTINGS.find(l => l.id === heroMatch[1]) : null;
  const alts = altMatches.map(m => ({ listing: LISTINGS.find(l => l.id === m[1]), label: m[2], reason: m[3] })).filter(a => a.listing);
  const rnms = rnmMatches.map(m => ({ listing: LISTINGS.find(l => l.id === m[1]), context: m[2] })).filter(r => r.listing);
  const chips = chipMatch ? chipMatch[1].split("|").map(s => s.trim()) : [];
  const clean = raw.replace(/\[HERO:.*?\]/g,"").replace(/\[ALT:.*?\]/g,"").replace(/\[RNM:.*?\]/g,"").replace(/\[CHIPS:.*?\]/g,"").trim();
  let resultsHTML = "";
  if (heroListing || alts.length || rnms.length) {
    resultsHTML = `<div class="results-wrap">`;
    if (heroListing) resultsHTML += heroCard(heroListing);
    if (alts.length) resultsHTML += `<div class="alt-cards">${alts.map(a => altCard(a.listing, a.label, a.reason)).join("")}</div>`;
    if (rnms.length) resultsHTML += `<div class="rnm-section"><div class="rnm-label">Also discussed — not currently available</div>${rnms.map(r => rnmCard(r.listing, r.context)).join("")}</div>`;
    resultsHTML += `</div>`;
  }
  const chipsHTML = chips.length ? `<div class="chips">${chips.map(c => `<button class="chip" onclick="handleChip('${c}')">${c}</button>`).join("")}</div>` : "";
  return { clean, resultsHTML, chipsHTML };
}

function addMsg(role, text, resultsHTML, chipsHTML) {
  const msgs = document.getElementById("msgs");
  const row = document.createElement("div");
  row.className = "row " + role;
  const avHTML = `<div class="av${role === "user" ? " av-user" : ""}">${role === "sam" ? "S" : "U"}</div>`;
  if (role === "sam") {
    row.innerHTML = `${avHTML}<div class="msg-wrap"><div class="lbl">Sam</div><div class="bubble sam">${text}</div>${chipsHTML || ""}${resultsHTML || ""}</div>`;
  } else {
    row.innerHTML = `<div class="msg-wrap"><div class="lbl" style="text-align:right">You</div><div class="bubble user">${text}</div></div>${avHTML}`;
  }
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById("msgs");
  const row = document.createElement("div");
  row.id = "typing-row";
  row.className = "row sam";
  row.innerHTML = `<div class="av">S</div><div class="msg-wrap"><div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}
function hideTyping() { const t = document.getElementById("typing-row"); if (t) t.remove(); }

function handleChip(text) {
  document.getElementById("inp").value = text;
  send();
}

async function send() {
  const inp = document.getElementById("inp");
  const q = inp.value.trim();
  if (!q) return;
  inp.value = "";
  inp.style.height = "auto";
  document.getElementById("btn").disabled = true;
  addMsg("user", q, "", "");
  history.push({ role: "user", content: q });
  showTyping();
  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: history, system: SYS })
    });
    const data = await res.json();
    const raw = data.text || "Something went wrong.";
    const { clean, resultsHTML, chipsHTML } = parseResults(raw);
    hideTyping();
    addMsg("sam", clean, resultsHTML, chipsHTML);
    history.push({ role: "assistant", content: raw });
  } catch (e) {
    hideTyping();
    addMsg("sam", "Connection issue — try again.", "", "");
  }
  document.getElementById("btn").disabled = false;
}

document.getElementById("btn").addEventListener("click", send);
document.getElementById("inp").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});
document.getElementById("inp").addEventListener("input", function() {
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 120) + "px";
});
setTimeout(() => addMsg("sam", "Hey — what are you looking for?", "", ""), 200);
</script>
