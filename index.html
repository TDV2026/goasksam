<title>GoAskSam</title>

  #header p { font-size: 11px; color: #888; }
  #msgs { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 20px; max-width: 780px; width: 100%; margin: 0 auto; }

  .row.user { flex-direction: row-reverse; }
  .msg-wrap { display: flex; flex-direction: column; gap: 8px; max-width: 82%; }
  .row.user .msg-wrap { align-items: flex-end; }
  .lbl { font-size: 11px; color: #aaa; padding: 0 2px; }
  .bubble { padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.6; }
  .bubble.sam { background: #fff; color: #1a1a1a; border-bottom-left-radius: 4px; border: 1px solid #e8e8e4; }
  .bubble.user { background: #185FA5; color: #fff; border-bottom-right-radius: 4px; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { padding: 7px 14px; border-radius: 20px; border: 1px solid #d0d0cc; background: #fff; font-size: 13px; color: #333; cursor: pointer; transition: all 0.12s; white-space: nowrap; }

  .dot { width: 6px; height: 6px; border-radius: 50%; background: #bbb; animation: pulse 1.4s ease-in-out infinite; }
  .dot:nth-child(2) { animation-delay: .2s; }
  .dot:nth-child(3) { animation-delay: .4s; }
  @keyframes pulse { 0%,80%,100%{opacity:.3} 40%{opacity:1} }
  .cards-grid { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 680px; }

  .car-card-body { padding: 14px 16px; }
  .car-card-title { font-size: 16px; font-weight: 700; color: #1a1a1a; line-height: 1.2; }
  .car-card-sub { font-size: 12px; color: #999; margin-top: 3px; }
  .badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .badge { font-size: 11px; padding: 3px 9px; border-radius: 99px; font-weight: 500; white-space: nowrap; }
  .badge-live { background: #e6f4d7; color: #2d6a0f; }
  .badge-unsold { background: #fef3e2; color: #9a6000; }
  .badge-sold { background: #dbeafe; color: #1e4fa5; }
  .badge-reserve { background: #f3f4f6; color: #555; }
  .badge-noreserve { background: #f0fdf4; color: #166534; }

  .car-card-price-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.4px; }
  .car-card-price { font-size: 22px; font-weight: 700; color: #1a1a1a; }
  .car-card-highlights { margin-top: 12px; display: flex; flex-direction: column; gap: 5px; }
  .highlight { font-size: 13px; color: #444; display: flex; gap: 7px; align-items: flex-start; line-height: 1.4; }
  .highlight-dot { width: 5px; height: 5px; border-radius: 50%; background: #185FA5; flex-shrink: 0; margin-top: 6px; }
  .highlight-dot.warn { background: #c2410c; }
  .car-card-actions { display: flex; gap: 10px; padding: 12px 16px 14px; border-top: 1px solid #f0f0ee; }
  .btn-secondary { flex: 1; padding: 10px; background: #fff; color: #185FA5; border: 1px solid #185FA5; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-secondary:hover { background: #f0f6ff; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; display: flex; align-items: flex-end; justify-content: center; }
  .modal { background: #fff; border-radius: 20px 20px 0 0; width: 100%; max-width: 680px; max-height: 80vh; overflow-y: auto; padding: 20px 20px 32px; position: relative; }
  .modal-handle { width: 36px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 16px; }
  .modal-title { font-size: 17px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; }
  .modal-sub { font-size: 12px; color: #999; margin-bottom: 16px; }
  .modal-section { margin-bottom: 14px; }
  .modal-section-label { font-size: 11px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
  .modal-section-text { font-size: 14px; color: #333; line-height: 1.6; }
  .modal-close { position: absolute; top: 16px; right: 16px; width: 28px; height: 28px; border-radius: 50%; background: #f0f0ee; border: none; font-size: 16px; cursor: pointer; color: #666; }
  #bottom { padding: 12px 20px 18px; background: #fff; border-top: 1px solid #e8e8e4; flex-shrink: 0; }
  #bottom-inner { max-width: 780px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end; }
  #inp { flex: 1; border: 1px solid #ddd; border-radius: 22px; padding: 10px 18px; font-size: 14px; font-family: inherit; resize: none; outline: none; background: #f9f9f7; color: #1a1a1a; line-height: 1.5; max-height: 120px; }
  #inp:focus { border-color: #185FA5; background: #fff; }
  #btn { width: 36px; height: 36px; border-radius: 50%; border: none; background: #185FA5; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 18px; }
  #btn:hover { background: #0d4a87; }
  #btn:disabled { background: #ccc; cursor: default; }
</style>

const SYS = `You are Sam — the smartest car friend the user has ever had. You work for GoAskSam, a collector car intelligence platform.

LISTINGS:
${JSON.stringify(LISTINGS)}

YOUR CORE JOB IN ORDER:
1. Understand what the user actually wants
2. Find the right cars
3. Show intelligence about those cars

CONVERSATION FLOW:
- Broad query ("I want a Porsche") → ask ONE clarifying question. Do NOT show cards.
- Semi-specific ("manual Porsche sports car") → maybe one more question, then show cards.
- Specific ("manual 981 Cayman under $50k") → show cards immediately.
- Max 2-3 questions total before showing results. One question at a time only.

CHIPS — suggest tappable options when asking questions:
Use [CHIPS:Option 1|Option 2|Option 3] after your question. 3-5 options max.
Example: "What kind of Porsche?" [CHIPS:Sports car|SUV|Collector piece|Not sure]

WHEN TO SHOW CARDS:
- You have: make/type + budget OR transmission (enough to filter meaningfully)
- User is specific enough that more questions won't improve results
- Format: [CARDS:id1,id2,id3] at end of message
- Before cards: one short sentence only. "Two matches. One no reserve, one has an open concern."
- Max 5 cards

TONE:
- 1-2 sentences max unless asked for detail
- Conversational, direct, opinionated
- No bullets, no lists, pure prose
- No em dashes, no filler
- Handle typos naturally

PRICING:
- Live: "currently bid to $X"
- Unsold: "bid to $X before reserve wasn't met"
- Sold: "sold for $X"

STATUS: live = active auction, unsold = reserve not met, sold = completed sale

Off-topic: "That's outside my lane — ChatGPT handles that better. Car question?"
Never mention Claude or Anthropic.`;

const history = [];

function priceInfo(l) {
  if (l.status === "sold") return { label: "sold for", cls: "badge-sold", pill: "sold" };
  if (l.status === "unsold") return { label: "bid to", cls: "badge-unsold", pill: "reserve not met" };
  return { label: "current bid", cls: "badge-live", pill: "live" };
}

function cardHTML(l) {
  const p = priceInfo(l);
  const reserveBadge = l.status === "live"
    ? `<span class="badge ${l.reserve ? 'badge-reserve' : 'badge-noreserve'}">${l.reserve ? 'reserve' : 'no reserve'}</span>`
    : "";
  return `<div class="car-card">
    <img class="car-card-img" src="${l.img}" alt="${l.year} ${l.make} ${l.model}" onerror="this.style.background='#ddd'">
    <div class="car-card-body">
      <div class="car-card-title">${l.year} ${l.make} ${l.model}</div>
      <div class="car-card-sub">${l.miles.toLocaleString()} mi · ${l.trans} · ${l.loc}</div>
      <div class="badges">
        <span class="badge ${p.cls}">${p.pill}</span>
        ${reserveBadge}
      </div>
      <div class="car-card-price-row">
        <span class="car-card-price-label">${p.label}</span>
        <span class="car-card-price">$${l.price.toLocaleString()}</span>
      </div>
      <div class="car-card-highlights">
        <div class="highlight"><div class="highlight-dot"></div><span>${l.h1}</span></div>
        <div class="highlight"><div class="highlight-dot"></div><span>${l.h2}</span></div>
        <div class="highlight"><div class="highlight-dot warn"></div><span>${l.warn}</span></div>
      </div>
    </div>
    <div class="car-card-actions">
      <button class="btn-secondary" onclick="showTake('${l.id}')">Sam's Take</button>
    </div>
  </div>`;
}

function showTake(id) {
  const l = LISTINGS.find(x => x.id === id);
  if (!l) return;
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = `<div class="modal">
    <div class="modal-handle"></div>
    <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
    <div class="modal-title">${l.year} ${l.make} ${l.model}</div>
    <div class="modal-sub">${l.miles.toLocaleString()} mi · ${l.trans} · ${l.loc}</div>
    <div class="modal-section">
      <div class="modal-section-label">Concerns</div>
      <div class="modal-section-text">${l.concerns}</div>
    </div>
    <div class="modal-section">
      <div class="modal-section-label">Service History</div>
      <div class="modal-section-text">${l.service}</div>
    </div>
    <div class="modal-section">
      <div class="modal-section-label">Market Context</div>
      <div class="modal-section-text">${l.market}</div>
    </div>
  </div>`;
  overlay.addEventListener("click", e => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

function addMsg(role, text, ids, chips) {
  const msgs = document.getElementById("msgs");
  const row = document.createElement("div");
  row.className = "row " + role;

  let cardsHTML = "";
  if (ids && ids.length) {
    const matched = ids.map(id => LISTINGS.find(l => l.id === id)).filter(Boolean);
    if (matched.length) cardsHTML = `<div class="cards-grid">${matched.map(cardHTML).join("")}</div>`;
  }

  let chipsHTML = "";
  if (chips && chips.length) {
    chipsHTML = `<div class="chips">${chips.map(c => `<button class="chip" onclick="handleChip('${c}')">${c}</button>`).join("")}</div>`;
  }

  const avHTML = `<div class="av${role === "user" ? " av-user" : ""}">${role === "sam" ? "S" : "U"}</div>`;

  if (role === "sam") {
    row.innerHTML = `${avHTML}<div class="msg-wrap"><div class="lbl">Sam</div><div class="bubble sam">${text}</div>${chipsHTML}${cardsHTML}</div>`;
  } else {
    row.innerHTML = `<div class="msg-wrap"><div class="lbl" style="text-align:right">You</div><div class="bubble user">${text}</div></div>${avHTML}`;
  }
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById("msgs");
  const row = document.createElement("div");
  row.id = "typing-row";
  row.className = "row sam";
  row.innerHTML = `<div class="av">S</div><div class="msg-wrap"><div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}
function hideTyping() { const t = document.getElementById("typing-row"); if (t) t.remove(); }

function handleChip(text) {
  document.getElementById("inp").value = text;
  send();
}

async function send() {
  const inp = document.getElementById("inp");
  const q = inp.value.trim();
  if (!q) return;
  inp.value = "";
  inp.style.height = "auto";
  document.getElementById("btn").disabled = true;
  addMsg("user", q);
  history.push({ role: "user", content: q });
  showTyping();
  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: history, system: SYS })
    });
    const data = await res.json();
    const raw = data.text || "Something went wrong.";
    const cardMatch = raw.match(/\[CARDS:(.*?)\]/);
    const ids = cardMatch ? cardMatch[1].split(",").map(s => s.trim()) : [];
    const chipMatch = raw.match(/\[CHIPS:(.*?)\]/);
    const chips = chipMatch ? chipMatch[1].split("|").map(s => s.trim()) : [];
    const clean = raw.replace(/\[CARDS:.*?\]/g, "").replace(/\[CHIPS:.*?\]/g, "").trim();
    hideTyping();
    addMsg("sam", clean, ids, chips);
    history.push({ role: "assistant", content: raw });
  } catch (e) {
    hideTyping();
    addMsg("sam", "Connection issue — try again.", []);
  }
  document.getElementById("btn").disabled = false;
}

document.getElementById("btn").addEventListener("click", send);
document.getElementById("inp").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});
document.getElementById("inp").addEventListener("input", function() {
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 120) + "px";
});
setTimeout(() => addMsg("sam", "Hey — what are you looking for?", [], []), 200);
</script>
