<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9f9f7; height: 100dvh; display: flex; flex-direction: column; }
  #header { padding: 14px 20px; background: #fff; border-bottom: 1px solid #e8e8e4; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .av { width: 30px; height: 30px; border-radius: 50%; background: #185FA5; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: #fff; flex-shrink: 0; }
  .av-user { background: #555; }
  #header h1 { font-size: 16px; font-weight: 600; color: #1a1a1a; }
  #header p { font-size: 11px; color: #888; }
  #msgs { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 20px; max-width: 760px; width: 100%; margin: 0 auto; }
  .row { display: flex; gap: 10px; align-items: flex-start; }
  .row.user { flex-direction: row-reverse; }
  .msg-wrap { display: flex; flex-direction: column; gap: 10px; max-width: 78%; }
  .row.user .msg-wrap { align-items: flex-end; }
  .lbl { font-size: 11px; color: #aaa; padding: 0 2px; }
  .bubble { padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.6; }
  .bubble.sam { background: #fff; color: #1a1a1a; border-bottom-left-radius: 4px; border: 1px solid #e8e8e4; }
  .bubble.user { background: #185FA5; color: #fff; border-bottom-right-radius: 4px; }
  .typing-bubble { background: #fff; border: 1px solid #e8e8e4; border-radius: 18px; border-bottom-left-radius: 4px; padding: 14px 18px; display: inline-flex; gap: 5px; align-items: center; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #bbb; animation: pulse 1.4s ease-in-out infinite; }
  .dot:nth-child(2) { animation-delay: .2s; }
  .dot:nth-child(3) { animation-delay: .4s; }
  @keyframes pulse { 0%,80%,100%{opacity:.3} 40%{opacity:1} }
  .cards-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .car-card { border: 1px solid #e8e8e4; border-radius: 12px; overflow: hidden; background: #fff; width: 190px; flex-shrink: 0; cursor: pointer; transition: box-shadow 0.15s; }
  .car-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
  .car-card img { width: 100%; height: 115px; object-fit: cover; display: block; background: #eee; }
  .car-card-body { padding: 10px 11px 11px; }
  .car-card-title { font-size: 12px; font-weight: 600; color: #1a1a1a; line-height: 1.3; }
  .car-card-sub { font-size: 11px; color: #999; margin-top: 2px; }
  .car-card-row { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 8px; }
  .car-card-price-wrap { display: flex; flex-direction: column; }
  .car-card-price-label { font-size: 9px; color: #aaa; text-transform: uppercase; letter-spacing: 0.4px; }
  .car-card-price { font-size: 14px; font-weight: 700; color: #1a1a1a; }
  .pill { font-size: 10px; padding: 3px 7px; border-radius: 99px; font-weight: 500; white-space: nowrap; }
  .pill-live { background: #e6f4d7; color: #2d6a0f; }
  .pill-unsold { background: #fef3e2; color: #9a6000; }
  .pill-sold { background: #dbeafe; color: #1e4fa5; }
  #bottom { padding: 14px 20px 18px; background: #fff; border-top: 1px solid #e8e8e4; flex-shrink: 0; }
  #bottom-inner { max-width: 760px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end; }
  #inp { flex: 1; border: 1px solid #ddd; border-radius: 22px; padding: 10px 18px; font-size: 14px; font-family: inherit; resize: none; outline: none; background: #f9f9f7; color: #1a1a1a; line-height: 1.5; max-height: 120px; }
  #inp:focus { border-color: #185FA5; background: #fff; }
  #btn { width: 36px; height: 36px; border-radius: 50%; border: none; background: #185FA5; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 18px; transition: background 0.15s; }
  #btn:hover { background: #0d4a87; }
  #btn:disabled { background: #ccc; cursor: default; }
</style>
</head>

const SYS = `You are Sam — the smartest car friend the user has ever had. You work for GoAskSam, a collector car intelligence platform. You have access to real auction listings.

LISTINGS:
${JSON.stringify(LISTINGS)}

RULES:
- Talk like a knowledgeable opinionated car friend. Direct. Concise.
- 2-3 sentences MAX unless they ask for more detail.
- No bullet points. No lists. Pure conversational prose.
- No em dashes. No AI filler. No hedging.
- Handle typos and slang naturally.
- Full conversation memory — reference earlier messages naturally.
- When mentioning specific cars, end your message with [CARDS:id1,id2] using exact listing IDs. Only cards for cars you actually discuss.
- If you don't have a car they want: say so plainly, offer closest match.
- status: "live" = active auction, "unsold" = reserve not met (market intel), "sold" = completed sale (comp data).
- price = current bid on live auctions, NOT final price. Always say "current bid" for live listings.
- Be genuinely opinionated. Good deal? Say it. Real problem? Say it plainly.
- Off-topic: "That's outside my lane — ChatGPT handles that better. Car question?"
- Never mention Claude or Anthropic.`;

const history = [];

function priceLabel(l) {
  if (l.status === "sold") return { label: "sold for", cls: "pill-sold", pill: "sold" };
  if (l.status === "unsold") return { label: "bid to", cls: "pill-unsold", pill: "reserve not met" };
  return { label: "current bid", cls: "pill-live", pill: l.bids + " bids" };
}

function cardHTML(l) {
  const p = priceLabel(l);
  return `<div class="car-card">
    <img src="${l.img}" alt="${l.year} ${l.make} ${l.model}" onerror="this.style.background='#ddd'">
    <div class="car-card-body">
      <div class="car-card-title">${l.year} ${l.make} ${l.model}</div>
      <div class="car-card-sub">${l.miles.toLocaleString()} mi · ${l.trans} · ${l.loc}</div>
      <div class="car-card-row">
        <div class="car-card-price-wrap">
          <span class="car-card-price-label">${p.label}</span>
          <span class="car-card-price">$${l.price.toLocaleString()}</span>
        </div>
        <span class="pill ${p.cls}">${p.pill}</span>
      </div>
    </div>
  </div>`;
}

function addMsg(role, text, ids) {
  const msgs = document.getElementById("msgs");
  const row = document.createElement("div");
  row.className = "row " + role;
  let cards = "";
  if (ids && ids.length) {
    const matched = ids.map(id => LISTINGS.find(l => l.id === id)).filter(Boolean);
    if (matched.length) cards = `<div class="cards-row">${matched.map(cardHTML).join("")}</div>`;
  }
  const avHTML = `<div class="av${role === "user" ? " av-user" : ""}">${role === "sam" ? "S" : "U"}</div>`;
  const labelHTML = `<div class="lbl">${role === "sam" ? "Sam" : "You"}</div>`;
  const bubbleHTML = `<div class="bubble ${role}">${text}</div>`;
  if (role === "sam") {
    row.innerHTML = `${avHTML}<div class="msg-wrap">${labelHTML}${bubbleHTML}${cards}</div>`;
  } else {
    row.innerHTML = `<div class="msg-wrap">${labelHTML}${bubbleHTML}</div>${avHTML}`;
  }
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById("msgs");
  const row = document.createElement("div");
  row.id = "typing-row";
  row.className = "row sam";
  row.innerHTML = `<div class="av">S</div><div class="msg-wrap"><div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}
function hideTyping() { const t = document.getElementById("typing-row"); if (t) t.remove(); }

async function send() {
  const inp = document.getElementById("inp");
  const q = inp.value.trim();
  if (!q) return;
  inp.value = "";
  inp.style.height = "auto";
  document.getElementById("btn").disabled = true;
  addMsg("user", q);
  history.push({ role: "user", content: q });
  showTyping();
  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: history, system: SYS })
    });
    const data = await res.json();
    const raw = data.text || "Something went wrong.";
    const cardMatch = raw.match(/\[CARDS:(.*?)\]/);
    const ids = cardMatch ? cardMatch[1].split(",").map(s => s.trim()) : [];
    const clean = raw.replace(/\[CARDS:.*?\]/g, "").trim();
    hideTyping();
    addMsg("sam", clean, ids);
    history.push({ role: "assistant", content: raw });
  } catch (e) {
    hideTyping();
    addMsg("sam", "Connection issue — try again.", []);
  }
  document.getElementById("btn").disabled = false;
}

document.getElementById("btn").addEventListener("click", send);
document.getElementById("inp").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});
document.getElementById("inp").addEventListener("input", function() {
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 120) + "px";
});
setTimeout(() => addMsg("sam", "Hey — what are you looking for?", []), 200);
</script>
</body>
</html>
