<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GoAskSam</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=switzer@400,500,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="rail">
  <div class="logo">
    <div class="logo-mark">S</div>
    <div>
      <div class="logo-title">GoAskSam</div>
      <div class="logo-sub">seller intelligence</div>
    </div>
  </div>
  <button class="rail-btn active" onclick="newConversation()">✦ New conversation</button>
  <div class="rail-divider"></div>
  <div class="rail-label">Sell</div>
  <div class="rail-item" onclick="startSellFlow()">✦ Start selling</div>
  <div class="rail-label">Learn</div>
  <div class="rail-item" onclick="showPowerSellerExplainer()">What is a PowerSeller?</div>
</div>

<div id="main">
  <div id="msgs">
    <div class="hero" id="hero">
      <div class="hero-inner">
        <div class="hero-logo">S</div>
        <h1>Where should you sell your car?</h1>
        <div class="hero-sub">Answer a few quick questions and I’ll tell you where I’d sell it, and why.</div>
        <div class="hero-start">
          <button onclick="startSellFlow()">Start selling</button>
          <div class="hero-start-note">Takes about one minute.</div>
          <div class="hero-secondary">or type the car below if you already know what you’re selling</div>
        </div>
      </div>
    </div>
  </div>
  <div id="input-area">
    <div id="input-box">
      <textarea id="inp" rows="1" placeholder="2018 Porsche 911 Carrera GTS"></textarea>
      <button id="btn">↑</button>
    </div>
    <div id="hint"></div>
  </div>
</div>

<script src="js/wizard.js"></script>
<script src="js/pipeline.js"></script>
<script src="js/steps.js"></script>
<script src="js/result.js"></script>
<script src="js/chat-core.js"></script>
<script src="js/result-copy.js"></script>
<script src="js/entry.js"></script>
</body>
</html>
