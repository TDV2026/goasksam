  .dot:nth-child(3) { animation-delay: .4s; }

3. Identify alternatives using [ALT:id|Label|One-line reason] where Label is like "Also worth a look" or "High risk / high reward"
4. Identify any reserve-not-met comps using [RNM:id|One-line context]
5. Never mix RNM listings in with live buying opportunities.

Example output:
The Cayman is the one I'd be watching — 16k miles on a manual 981 is exceptional and Guards Red rarely comes up clean. I'd skip the 911 SC for now: 220k miles and no rebuild docs is too much unknown. The Boxster S stalled because of accident history, which tells you where the market is.
[HERO:L07]
[ALT:L01|Worth investigating|Huge appeal but undocumented rebuild is real risk]
[RNM:S03|Bid to $41k before reserve wasn't met — accident history is why]

CHIPS:
Use [CHIPS:Option 1|Option 2|Option 3] when asking a clarifying question.

TONE:
- 2-4 sentences of real opinion before showing cards
- No bullets in prose. No em dashes. No filler. Direct.
- Handle typos naturally.

PRICING:
- Live: "currently bid to $X"
- Unsold: "bid to $X before reserve wasn't met"
- Sold: "sold for $X"

Off-topic: "That's outside my lane — ChatGPT handles that better. Car question?"
Never mention Claude or Anthropic.`;

const history = [];

function showTake(id) {
  const l = LISTINGS.find(x => x.id === id);
  if (!l) return;
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = `<div class="modal">
    <div class="modal-handle"></div>
    <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
    <div class="modal-title">${l.year} ${l.make} ${l.model}</div>
    <div class="modal-sub">${(l.miles||0).toLocaleString()} mi · ${l.trans||''} · ${l.loc}</div>
    <div class="modal-section"><div class="modal-section-label">Concerns</div><div class="modal-section-text">${l.concerns}</div></div>
    <div class="modal-section"><div class="modal-section-label">Service History</div><div class="modal-section-text">${l.service}</div></div>
    <div class="modal-section"><div class="modal-section-label">Market Context</div><div class="modal-section-text">${l.market}</div></div>
  </div>`;
  overlay.addEventListener("click", e => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

function heroCard(l) {
  const reserveBadge = l.reserve === false
    ? `<span class="badge badge-noreserve">no reserve</span>`
    : `<span class="badge badge-reserve">reserve</span>`;
  return `<div class="card-hero">
    <div class="card-hero-label">⭐ Sam's Pick</div>
    <img class="card-hero-img" src="${l.img}" alt="${l.year} ${l.make}" onerror="this.style.background='#ddd'">
    <div class="card-hero-body">
      <div class="card-hero-title">${l.year} ${l.make} ${l.model}</div>
      <div class="card-hero-sub">${l.miles.toLocaleString()} mi · ${l.trans} · ${l.loc}</div>
      <div class="card-hero-price-row">
        <div class="card-hero-price-wrap">
          <span class="price-label">current bid</span>
          <span class="price-val">$${l.price.toLocaleString()}</span>
        </div>
        <div class="badges"><span class="badge badge-live">live</span>${reserveBadge}</div>
      </div>
    </div>
    <div class="card-hero-actions">
      <button class="btn-ghost" onclick="showTake('${l.id}')">Sam's Take</button>
    </div>
  </div>`;
}

function altCard(l, label, reason) {
  const isWarn = label.toLowerCase().includes("risk") || label.toLowerCase().includes("caution");
  return `<div class="card-alt">
    <img class="card-alt-img" src="${l.img}" alt="${l.year} ${l.make}" onerror="this.style.background='#ddd'">
    <div class="card-alt-body">
      <div class="card-alt-label ${isWarn ? 'caution' : ''}">${label}</div>
      <div class="card-alt-title">${l.year} ${l.make} ${l.model}</div>
      <div class="card-alt-reason">${reason}</div>
      <div class="card-alt-bottom">
        <span class="card-alt-price">$${l.price.toLocaleString()}</span>
        <button class="card-alt-action" onclick="showTake('${l.id}')">Sam's Take →</button>
      </div>
    </div>
  </div>`;
}

function rnmCard(l, context) {
  return `<div class="card-rnm">
    <div class="card-rnm-left">
      <div class="card-rnm-title">${l.year} ${l.make} ${l.model}</div>
      <div class="card-rnm-sub">${context}</div>
    </div>
    <div class="card-rnm-right">bid to $${l.price.toLocaleString()}<br>reserve not met</div>
  </div>`;
}

function parseAndRenderResults(raw) {
  const heroMatch = raw.match(/\[HERO:(\w+)\]/);
  const altMatches = [...raw.matchAll(/\[ALT:(\w+)\|([^|]+)\|([^\]]+)\]/g)];
  const rnmMatches = [...raw.matchAll(/\[RNM:(\w+)\|([^\]]+)\]/g)];
  const chipMatch = raw.match(/\[CHIPS:(.*?)\]/);

  const heroId = heroMatch ? heroMatch[1] : null;
  const heroListing = heroId ? LISTINGS.find(l => l.id === heroId) : null;
  const alts = altMatches.map(m => ({ listing: LISTINGS.find(l => l.id === m[1]), label: m[2], reason: m[3] })).filter(a => a.listing);
  const rnms = rnmMatches.map(m => ({ listing: LISTINGS.find(l => l.id === m[1]), context: m[2] })).filter(r => r.listing);
  const chips = chipMatch ? chipMatch[1].split("|").map(s => s.trim()) : [];

  const clean = raw
    .replace(/\[HERO:.*?\]/g, "")
    .replace(/\[ALT:.*?\]/g, "")
    .replace(/\[RNM:.*?\]/g, "")
    .replace(/\[CHIPS:.*?\]/g, "")
    .trim();

  let resultsHTML = "";
  if (heroListing || alts.length || rnms.length) {
    resultsHTML = `<div class="results-wrap">`;
    if (heroListing) resultsHTML += heroCard(heroListing);
    if (alts.length) resultsHTML += `<div class="alt-cards">${alts.map(a => altCard(a.listing, a.label, a.reason)).join("")}</div>`;
    if (rnms.length) {
      resultsHTML += `<div class="rnm-section"><div class="rnm-label">Also discussed — not currently available</div>${rnms.map(r => rnmCard(r.listing, r.context)).join("")}</div>`;
    }
    resultsHTML += `</div>`;
  }

  let chipsHTML = "";
  if (chips.length) {
    chipsHTML = `<div class="chips">${chips.map(c => `<button class="chip" onclick="handleChip('${c}')">${c}</button>`).join("")}</div>`;
  }

  return { clean, resultsHTML, chipsHTML };
}

function addMsg(role, text, resultsHTML, chipsHTML) {
  const msgs = document.getElementById("msgs");
  const row = document.createElement("div");
  row.className = "row " + role;
  const avHTML = `<div class="av${role === "user" ? " av-user" : ""}">${role === "sam" ? "S" : "U"}</div>`;
  if (role === "sam") {
    row.innerHTML = `${avHTML}<div class="msg-wrap"><div class="lbl">Sam</div><div class="bubble sam">${text}</div>${chipsHTML || ""}${resultsHTML || ""}</div>`;
  } else {
    row.innerHTML = `<div class="msg-wrap"><div class="lbl" style="text-align:right">You</div><div class="bubble user">${text}</div></div>${avHTML}`;
  }
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById("msgs");
  const row = document.createElement("div");
  row.id = "typing-row";
  row.className = "row sam";
  row.innerHTML = `<div class="av">S</div><div class="msg-wrap"><div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}
function hideTyping() { const t = document.getElementById("typing-row"); if (t) t.remove(); }

function handleChip(text) {
  document.getElementById("inp").value = text;
  send();
}

async function send() {
  const inp = document.getElementById("inp");
  const q = inp.value.trim();
  if (!q) return;
  inp.value = "";
  inp.style.height = "auto";
  document.getElementById("btn").disabled = true;
  addMsg("user", q, "", "");
  history.push({ role: "user", content: q });
  showTyping();
  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: history, system: SYS })
    });
    const data = await res.json();
    const raw = data.text || "Something went wrong.";
    const { clean, resultsHTML, chipsHTML } = parseAndRenderResults(raw);
    hideTyping();
    addMsg("sam", clean, resultsHTML, chipsHTML);
    history.push({ role: "assistant", content: raw });
  } catch (e) {
    hideTyping();
    addMsg("sam", "Connection issue — try again.", "", "");
  }
  document.getElementById("btn").disabled = false;
}

document.getElementById("btn").addEventListener("click", send);
document.getElementById("inp").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});
document.getElementById("inp").addEventListener("input", function() {
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 120) + "px";
});
setTimeout(() => addMsg("sam", "Hey — what are you looking for?", "", ""), 200);
</script>
