<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoAskSam</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9f9f7; height: 100dvh; display: flex; flex-direction: column; }
  #header { padding: 14px 20px; background: #fff; border-bottom: 1px solid #e8e8e4; display: flex; align-items: center; gap: 10px; }
  .av { width: 30px; height: 30px; border-radius: 50%; background: #185FA5; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: #fff; flex-shrink: 0; }
  #header h1 { font-size: 16px; font-weight: 600; color: #1a1a1a; }
  #header p { font-size: 12px; color: #888; }
  #msgs { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 18px; max-width: 800px; width: 100%; margin: 0 auto; }
  .row { display: flex; gap: 10px; align-items: flex-start; }
  .row.user { flex-direction: row-reverse; }
  .bubble { max-width: 75%; padding: 11px 15px; border-radius: 18px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
  .bubble.sam { background: #fff; color: #1a1a1a; border-bottom-left-radius: 4px; border: 1px solid #e8e8e4; }
  .bubble.user { background: #185FA5; color: #fff; border-bottom-right-radius: 4px; }
  .lbl { font-size: 11px; color: #aaa; margin-bottom: 3px; padding: 0 2px; }
  .lbl.right { text-align: right; }
  .typing-bubble { background: #fff; border: 1px solid #e8e8e4; border-radius: 18px; border-bottom-left-radius: 4px; padding: 14px 18px; display: flex; gap: 5px; align-items: center; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #bbb; animation: pulse 1.4s ease-in-out infinite; }
  .dot:nth-child(2) { animation-delay: .2s; }
  .dot:nth-child(3) { animation-delay: .4s; }
  @keyframes pulse { 0%,80%,100%{opacity:.3} 40%{opacity:1} }
  .cards-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; max-width: 600px; }
  .car-card { border: 1px solid #e8e8e4; border-radius: 10px; overflow: hidden; background: #fff; width: 200px; flex-shrink: 0; }
  .car-card img { width: 100%; height: 120px; object-fit: cover; display: block; background: #f0f0ee; }
  .car-card-body { padding: 10px 12px; }
  .car-card-title { font-size: 12px; font-weight: 600; color: #1a1a1a; line-height: 1.3; }
  .car-card-sub { font-size: 11px; color: #888; margin-top: 2px; }
  .car-card-row { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; }
  .car-card-price { font-size: 13px; font-weight: 600; color: #1a1a1a; }
  .pill { font-size: 10px; padding: 2px 7px; border-radius: 99px; font-weight: 500; }
  .pill-live { background: #e6f4d7; color: #3a7d1e; }
  .pill-unsold { background: #fef3e2; color: #9a6000; }
  .pill-sold { background: #dbeafe; color: #1e4fa5; }
  #bottom { padding: 14px 20px; background: #fff; border-top: 1px solid #e8e8e4; }
  #bottom-inner { max-width: 800px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end; }
  #inp { flex: 1; border: 1px solid #ddd; border-radius: 22px; padding: 10px 18px; font-size: 14px; font-family: inherit; resize: none; outline: none; background: #f9f9f7; color: #1a1a1a; line-height: 1.5; max-height: 120px; }
  #inp:focus { border-color: #185FA5; background: #fff; }
  #btn { width: 36px; height: 36px; border-radius: 50%; border: none; background: #185FA5; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 16px; }
  #btn:hover { background: #0d4a87; }
  #btn:disabled { background: #ccc; cursor: default; }
</style>
</head>
<body>

<div id="header">
  <div class="av">S</div>

    <p>collector car intelligence</p>
  </div>
</div>

</div>

const SYS = `You are Sam, the smartest car friend the user has ever talked to. You work for GoAskSam — a collector and enthusiast car intelligence platform. You have access to a real dataset of auction listings from Cars & Bids.

LISTINGS:
${JSON.stringify(LISTINGS)}

HOW YOU TALK:
- Like a knowledgeable car friend. Direct, opinionated, conversational. Never robotic.
- Max 3-4 sentences unless the user asks for more detail.
- Never use bullet points or numbered lists. Pure prose.
- No em dashes. No filler words. No AI-sounding language.
- Handle typos, slang, vague queries — figure out what they mean.
- Full back and forth conversation. Remember everything said earlier in the chat.
- If you mention specific cars from the dataset, end your message with [CARDS:id1,id2] so the UI shows them. Only include IDs of cars you actually discuss.
- If someone asks about a car you don't have, say so plainly and offer the closest thing you do have.
- status: "live" = active auction, "unsold" = reserve not met (use as market data), "sold" = completed sale (use as comp)
- Be opinionated. Good deal? Say so. Real problem? Say it plainly.
- Off topic: "That's outside my lane — ChatGPT handles that better. Got a car question?"`;

const history = [];

function cardHTML(l) {
  const st = l.status === "sold" ? `sold $${l.price.toLocaleString()}` : l.status === "unsold" ? "reserve not met" : `${l.bids} bids`;
  const pc = l.status === "sold" ? "pill-sold" : l.status === "unsold" ? "pill-unsold" : "pill-live";
  return `<div class="car-card">
    <img src="${l.img}" alt="${l.year} ${l.make}" onerror="this.style.background='#e8e8e4'">
    <div class="car-card-body">
      <div class="car-card-title">${l.year} ${l.make} ${l.model}</div>
      <div class="car-card-sub">${l.miles.toLocaleString()} mi · ${l.trans} · ${l.loc}</div>
      <div class="car-card-row">
        <span class="car-card-price">$${l.price.toLocaleString()}</span>
        <span class="pill ${pc}">${st}</span>
      </div>
    </div>
  </div>`;
}

function addMsg(role, text, ids) {
  const msgs = document.getElementById("msgs");
  const row = document.createElement("div");
  row.className = "row " + role;

  let cards = "";
  if (ids && ids.length) {
    const matched = ids.map(id => LISTINGS.find(l => l.id === id)).filter(Boolean);
    if (matched.length) cards = `<div class="cards-row">${matched.map(cardHTML).join("")}</div>`;
  }

  if (role === "sam") {
    row.innerHTML = `<div class="av">S</div><div><div class="lbl">Sam</div><div class="bubble sam">${text}</div>${cards}</div>`;
  } else {
    row.innerHTML = `<div><div class="lbl right">You</div><div class="bubble user">${text}</div></div><div class="av" style="background:#888">U</div>`;
  }
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById("msgs");
  const row = document.createElement("div");
  row.id = "typing-row";
  row.className = "row sam";
  row.innerHTML = `<div class="av">S</div><div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}
function hideTyping() { const t = document.getElementById("typing-row"); if (t) t.remove(); }

async function send() {
  const inp = document.getElementById("inp");
  const q = inp.value.trim();
  if (!q) return;
  inp.value = "";
  inp.style.height = "auto";
  document.getElementById("btn").disabled = true;

  addMsg("user", q);
  history.push({ role: "user", content: q });
  showTyping();

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: history, system: SYS })
    });
    const data = await res.json();
    const raw = data.text || "Something went wrong.";
    const cardMatch = raw.match(/\[CARDS:(.*?)\]/);
    const ids = cardMatch ? cardMatch[1].split(",").map(s => s.trim()) : [];
    const clean = raw.replace(/\[CARDS:.*?\]/g, "").trim();
    hideTyping();
    addMsg("sam", clean, ids);
    history.push({ role: "assistant", content: raw });
  } catch (e) {
    hideTyping();
    addMsg("sam", "Connection issue — try again.", []);
  }
  document.getElementById("btn").disabled = false;
}

document.getElementById("btn").addEventListener("click", send);
document.getElementById("inp").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});
document.getElementById("inp").addEventListener("input", function () {
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 120) + "px";
});

setTimeout(() => {
  addMsg("sam", "Hey — I'm watching 22 listings right now, live auctions and recent sales. What are you looking for?", []);
}, 200);
</script>
</body>
</html>
