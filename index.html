<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  #rail { width: 256px; background: #f9f9f8; border-right: 1px solid #ebebeb; display: flex; flex-direction: column; flex-shrink: 0; padding: 14px 10px; }

  #rail-logo-version { font-size: 11px; color: #bbb; }
  .rail-btn { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: 8px; cursor: pointer; color: #555; font-size: 13.5px; transition: background 0.1s; border: none; background: none; width: 100%; text-align: left; font-family: inherit; }
  .rail-btn:hover { background: #eeeeed; color: #1a1a1a; }
  .rail-btn.active { background: #eeeeed; color: #1a1a1a; font-weight: 500; }

  .rail-divider { height: 1px; background: #ebebeb; margin: 8px 4px; }

  .rail-chat-item:hover { background: #eeeeed; color: #1a1a1a; }
  #rail-footer { margin-top: auto; padding: 10px 10px 4px; font-size: 11px; color: #ccc; line-height: 1.5; }
  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #msgs { flex: 1; overflow-y: auto; padding: 48px 0 16px; display: flex; flex-direction: column; }

  #msgs::-webkit-scrollbar-thumb { background: #f0f0f0; border-radius: 4px; }
  .row { width: 100%; padding: 4px 0; }
  .row-inner { max-width: 700px; margin: 0 auto; padding: 0 28px; display: flex; gap: 16px; align-items: flex-start; }
  .row.user .row-inner { justify-content: flex-end; gap: 0; }
  .msg-wrap { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 10px; }
  .sam-name { font-size: 13px; font-weight: 600; color: #1a1a1a; margin-bottom: 2px; }
  .sam-text { font-size: 15px; line-height: 1.75; color: #1a1a1a; }
  .row.user .msg-wrap { flex: none; max-width: 58%; }
  .user-bubble { background: #1a1a1a; color: #fff; padding: 10px 16px; border-radius: 18px; border-bottom-right-radius: 4px; font-size: 15px; line-height: 1.6; display: inline-block; }
  .chips { display: flex; flex-wrap: wrap; gap: 7px; }
  .chip { padding: 7px 15px; border-radius: 99px; border: 1px solid #e0e0e0; background: #fff; font-size: 13px; color: #555; cursor: pointer; transition: all 0.1s; font-family: inherit; }
  .chip:hover { border-color: #1a1a1a; color: #1a1a1a; }
  .search-status { font-size: 13px; color: #999; font-style: italic; padding: 4px 0; }
  .typing-wrap { display: flex; gap: 4px; align-items: center; height: 24px; }
  .dot { width: 5px; height: 5px; border-radius: 50%; background: #bbb; animation: pulse 1.4s ease-in-out infinite; }
  .dot:nth-child(2) { animation-delay: .2s; }
  .dot:nth-child(3) { animation-delay: .4s; }
  @keyframes pulse { 0%,80%,100%{opacity:.3} 40%{opacity:1} }
  .results-wrap { display: flex; flex-direction: column; gap: 10px; width: 100%; }
  .card-hero { background: #fff; border: 1.5px solid #1a1a1a; border-radius: 14px; overflow: hidden; }
  .card-hero-label { background: #1a1a1a; color: #fff; font-size: 10px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; padding: 7px 14px; }
  .card-hero-img { width: 100%; height: 200px; object-fit: cover; display: block; background: #f0f0ee; }
  .card-hero-body { padding: 14px 16px 0; }
  .card-hero-title { font-size: 16px; font-weight: 600; }
  .card-hero-meta { font-size: 12px; color: #999; margin-top: 3px; }
  .card-hero-price-row { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 12px; }
  .price-wrap { display: flex; flex-direction: column; }
  .price-lbl { font-size: 10px; color: #bbb; text-transform: uppercase; letter-spacing: 0.4px; }
  .price-val { font-size: 20px; font-weight: 600; }
  .badges { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 500; }
  .badge-live { background: #e8f5e1; color: #2d6a0f; }
  .badge-reserve { background: #f3f4f6; color: #666; }
  .badge-noreserve { background: #ecfdf5; color: #166534; }
  .badge-rnm { background: #fef9ec; color: #9a6000; }
  .update-ticker { margin: 10px 16px 0; background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px; padding: 8px 12px; display: flex; gap: 8px; align-items: flex-start; }
  .update-dot { width: 6px; height: 6px; border-radius: 50%; background: #f59e0b; flex-shrink: 0; margin-top: 4px; animation: blink-dot 2s ease-in-out infinite; }
  @keyframes blink-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .update-text { font-size: 12px; color: #92400e; line-height: 1.5; }
  .update-time { font-size: 11px; color: #b45309; font-weight: 600; }
  .card-hero-actions { display: flex; gap: 8px; padding: 12px 16px 14px; margin-top: 12px; border-top: 1px solid #f0f0ee; }
  .btn-primary { flex: 1; padding: 9px; background: #1a1a1a; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; }
  .btn-primary:hover { background: #333; }
  .btn-take { flex: 1; padding: 9px; background: #fff; color: #1a1a1a; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; }
  .btn-take:hover { background: #f9f9f8; }
  .alt-cards { display: flex; flex-direction: column; gap: 8px; }
  .card-alt { background: #fff; border: 1px solid #ebebeb; border-radius: 12px; overflow: hidden; display: flex; }
  .card-alt-img { width: 96px; height: 76px; object-fit: cover; flex-shrink: 0; background: #f0f0ee; }
  .card-alt-body { padding: 10px 12px; flex: 1; display: flex; flex-direction: column; justify-content: space-between; min-width: 0; }
  .card-alt-label { font-size: 10px; font-weight: 600; color: #bbb; text-transform: uppercase; letter-spacing: 0.5px; }
  .card-alt-label.caution { color: #c2410c; }
  .card-alt-title { font-size: 13px; font-weight: 600; line-height: 1.3; margin-top: 1px; }
  .card-alt-reason { font-size: 12px; color: #888; margin-top: 3px; line-height: 1.35; }
  .card-alt-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; }
  .card-alt-price { font-size: 13px; font-weight: 600; }
  .card-alt-actions { display: flex; gap: 10px; }
  .card-alt-action { font-size: 12px; color: #999; font-weight: 500; cursor: pointer; background: none; border: none; padding: 0; font-family: inherit; }
  .card-alt-action:hover { color: #1a1a1a; }
  .rnm-section { border-top: 1px dashed #ebebeb; padding-top: 10px; }
  .rnm-label { font-size: 10px; color: #ccc; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .card-rnm { background: #fafaf9; border: 1px solid #f0f0ee; border-radius: 8px; padding: 10px 12px; display: flex; justify-content: space-between; align-items: center; }
  .card-rnm-title { font-size: 12px; font-weight: 600; color: #999; }
  .card-rnm-sub { font-size: 11px; color: #bbb; margin-top: 1px; }
  .card-rnm-right { font-size: 11px; color: #bbb; text-align: right; flex-shrink: 0; margin-left: 12px; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 100; display: flex; align-items: flex-end; justify-content: center; }
  .modal { background: #fff; border-radius: 20px 20px 0 0; width: 100%; max-width: 700px; max-height: 82vh; overflow-y: auto; padding: 20px 24px 40px; position: relative; }
  .modal-handle { width: 32px; height: 4px; background: #e8e8e8; border-radius: 2px; margin: 0 auto 18px; }
  .modal-title { font-size: 16px; font-weight: 600; }
  .modal-sub { font-size: 12px; color: #bbb; margin-top: 2px; margin-bottom: 4px; }
  .modal-close { position: absolute; top: 18px; right: 18px; width: 26px; height: 26px; border-radius: 50%; background: #f3f3f3; border: none; font-size: 13px; cursor: pointer; color: #888; display: flex; align-items: center; justify-content: center; }
  .modal-reserve { display: inline-flex; font-size: 12px; font-weight: 500; padding: 3px 10px; border-radius: 99px; margin-bottom: 16px; margin-top: 6px; }
  .modal-reserve.active { background: #f3f4f6; color: #555; }
  .modal-reserve.noreserve { background: #ecfdf5; color: #166534; }
  .modal-reserve.rnm { background: #fef9ec; color: #9a6000; }
  .modal-view { font-size: 14px; color: #1a1a1a; line-height: 1.75; margin-bottom: 20px; padding: 14px 16px; background: #f9f9f8; border-radius: 10px; border-left: 3px solid #1a1a1a; }
  .modal-view-label { font-size: 10px; font-weight: 600; color: #bbb; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; }
  .modal-section { margin-bottom: 16px; }
  .modal-section-label { font-size: 10px; font-weight: 600; color: #bbb; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; }
  .modal-section-text { font-size: 14px; color: #555; line-height: 1.65; }
  .modal-update { background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px; padding: 10px 12px; margin-bottom: 16px; font-size: 13px; color: #92400e; line-height: 1.5; }
  #input-area { padding: 10px 28px 24px; flex-shrink: 0; max-width: 700px; width: 100%; margin: 0 auto; align-self: center; box-sizing: border-box; }
  #input-outer { background: #fff; border: 1px solid #d9d9d9; border-radius: 14px; padding: 12px 14px 12px 18px; display: flex; gap: 10px; align-items: flex-end; box-shadow: 0 1px 8px rgba(0,0,0,0.07); transition: border-color 0.15s, box-shadow 0.15s; }
  #input-outer:focus-within { border-color: #aaa; box-shadow: 0 2px 14px rgba(0,0,0,0.1); }
  #inp { flex: 1; border: none; background: transparent; font-size: 15px; font-family: inherit; resize: none; outline: none; color: #1a1a1a; line-height: 1.5; max-height: 160px; padding: 0; }
  #inp::placeholder { color: #bbb; }
  #btn { width: 34px; height: 34px; border-radius: 9px; border: none; background: #1a1a1a; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 16px; transition: background 0.1s; }
  #btn:hover { background: #333; }
  #btn:disabled { background: #e8e8e8; cursor: default; }
  #input-hint { text-align: center; font-size: 12px; color: #ccc; margin-top: 9px; }
</style>
</head>

<script>
const LISTINGS = [
  {id:"L01",status:"live",year:1978,make:"Porsche",model:"911 SC Targa",type:"sports",trans:"manual",drive:"RWD",price:20000,reserve:true,miles:220300,loc:"Elma, WA",url:"https://carsandbids.com",img:"https://media.carsandbids.com/cdn-cgi/image/width=2080,quality=70/4822e9034b0b6b357b3f73fabadfc10e586c36f68/photos/application/s-CixrIm_/edit/l3HoQ.jpg?t=177853174099",sam_view:"Long-term ownership since 1998 counts for something, and the $17k mechanical overhaul in 2024 was thorough. The undocumented engine rebuild is the sticking point — without paperwork on that, you're taking the seller's word for something that really matters.",what_i_like:"Long-term single ownership. Comprehensive 2024 mechanical overhaul. Targa spec with Fuchs wheels.",watch:"Engine and trans rebuilt at 180k under prior ownership — no documentation kept. Smog unit present but not connected.",service:"2024: full brake, fuel, ignition, wiring overhaul — $17k spent.",market:"SC Targas with documented history trade $35-55k. The undocumented rebuild is why this is priced where it is.",reserve_status:"active",updates:[{time:"6 hours ago",text:"Seller addressed carburetor question in comments. Confirmed vacuum-to-mechanical conversion. Community appears satisfied."}]},
  {id:"L02",status:"live",year:2007,make:"Hummer",model:"H3",type:"suv",trans:"automatic",drive:"4WD",price:3050,reserve:false,miles:139000,loc:"Great Neck, NY",url:"https://carsandbids.com",img:"https://media.carsandbids.com/cdn-cgi/image/width=2080,quality=70/c88a6ba8af4c9a8e9d9fe78c40ad6708f5bae9a9/photos/exterior/r4oWzwBp-cOziaMx/edit/0t8D1.jpg?t=177940852144",sam_view:"No reserve and a clean Carfax is about as straightforward as these get. Service history is thin but at this price that's priced in. Underbody corrosion on a NY car is worth a look before bidding further.",what_i_like:"No reserve. Clean Carfax. Full-time 4WD with skid plates.",watch:"Oil changes only in Carfax. Underbody corrosion visible.",service:"Oil changes only per Carfax. Dealer acquired April 2026.",market:"H3s in better condition trade $4-8k. This is entry pricing.",reserve_status:"none",updates:[]},
  {id:"L03",status:"live",year:2013,make:"Audi",model:"S4 Manual",type:"sports",trans:"manual",drive:"AWD",price:10000,reserve:false,miles:83000,loc:"Pompano Beach, FL",url:"https://carsandbids.com",img:"https://media.carsandbids.com/cdn-cgi/image/width=2080,quality=70/8666159a15ffd32049319e2dde0e1452e4fe28d1/photos/AudiS42013002.jpg?t=177913181045",sam_view:"Manual B8 S4 at $10k no reserve is the kind of listing worth paying attention to. The 6-year Carfax mileage gap is the question — seller explains it as a company car period, and documentation they uploaded seems to have satisfied the community.",what_i_like:"Manual B8 S4 — rare. One owner from new. Water pump, battery, DSG all done.",watch:"6-year Carfax mileage gap 2017-2023. Explanation credible but worth verifying.",service:"1 owner since new. DSG x2, spark plugs, water pump, battery all done.",market:"Manual B8 S4s command a premium. Autos trade $12-16k. $10k no reserve is strong value.",reserve_status:"none",updates:[{time:"3 hours ago",text:"Seller uploaded Carfax documentation addressing the mileage gap. Community response positive."}]},
  {id:"L04",status:"live",year:2022,make:"Rivian",model:"R1T Launch Edition",type:"truck",trans:"automatic",drive:"AWD",price:45000,reserve:true,miles:57200,loc:"Santa Cruz, CA",url:"https://carsandbids.com",img:"https://media.carsandbids.com/cdn-cgi/image/width=2080,quality=70/9004500a220bf3a3d455d15ee052cf8c332606f8/photos/K1BMpvqz-OVu2J5C/edit/zG4cp.jpg?t=177942111434",sam_view:"Launch Edition with large pack is the desirable spec — no longer orderable. Warranty work done before sale is a positive. I'd want clarity on whether the Rivian warranty transfers before bidding seriously.",what_i_like:"Launch Edition large pack — sold-out spec. Known warranty items addressed before sale.",watch:"Warranty transfer to new owner unconfirmed. Known reseller active in comments.",service:"Gen 2 subframe, tonneau, half-shaft boots, hubs replaced under Rivian warranty.",market:"R1T Launch Editions trading $42-52k. Reserve likely in that range.",reserve_status:"active",updates:[]},
  {id:"L05",status:"live",year:1993,make:"Volkswagen",model:"Cabriolet Classic Edition",type:"convertible",trans:"manual",drive:"FWD",price:4000,reserve:false,miles:141000,loc:"Crozet, VA",url:"https://carsandbids.com",img:"https://media.carsandbids.com/cdn-cgi/image/width=2080,quality=70/ee7f173e46ec801a48d1673c50f9cebaa1bf2854/photos/exterior/9em7RgZ6-DhDRWoU/edit/XbXv6.jpg?t=177868798407",sam_view:"Classic Green Pearl on a last-year Cabriolet is a genuinely good combination. The open concerns give me pause — an inoperative coolant gauge means flying blind on temperature, and the KE-Jetronic fuel system has a reputation.",what_i_like:"Rare Classic Green Pearl. Last-year spec. No reserve. Top replaced 2019.",watch:"Coolant gauge inoperative. Oil warning light intermittent when hot. KE-Jetronic flagged by community.",service:"Top 2019, seats 2025, timing belt 2011, clutch 2014.",market:"Clean Cabriolets in good colors trade $6-12k. Concerns explain the discount.",reserve_status:"none",updates:[]},
  {id:"L06",status:"live",year:2020,make:"Land Rover",model:"Range Rover SVAutobiography Dynamic",type:"suv",trans:"automatic",drive:"AWD",price:40000,reserve:true,miles:33000,loc:"San Luis Obispo, CA",url:"https://carsandbids.com",img:"https://media.carsandbids.com/cdn-cgi/image/width=2080,quality=70/da6e8a1d4896127a9d2adf83461993b45339474c/photos/application/s-_b78Pca/edit/FdNvu.jpg?t=177876856846",sam_view:"About as specced as a Range Rover gets — SVAutobiography Dynamic with supercharged V8, 33k miles, California car. No mechanical concerns surfaced. Reserve is active and likely well above current bidding.",what_i_like:"SVAutobiography Dynamic — pinnacle spec. 33k miles. California. No concerns surfaced.",watch:"Reserve almost certainly well above current bid. Auction is early.",service:"Low miles. California car. Recent Land Rover dealer service.",market:"SVAutobiography Dynamic examples trade $65-85k retail.",reserve_status:"active",updates:[]},
  {id:"L07",status:"live",year:2015,make:"Porsche",model:"Cayman 981",type:"sports",trans:"manual",drive:"RWD",price:35000,reserve:true,miles:16700,loc:"Salem, OR",url:"https://carsandbids.com",img:"https://media.carsandbids.com/cdn-cgi/image/width=2080,quality=70/c51905b0000b639a185eeb080dd879bf007f5604/photos/3oQw58xo-2PyUGXk/edit/hP0rA.jpg?t=177930231707",sam_view:"16,700 miles on a Guards Red manual 981 almost never comes up clean. The DME codes were concerning but the seller has been responsive — cold start video posted, paint meters added. Based on what's been disclosed so far this is the more straightforward of the manual Porsches here.",what_i_like:"16,700 miles — exceptional. Guards Red manual rare. PASM, PPF, Bose. Paint meters confirm no prior bodywork.",watch:"Two DME codes — seller believes battery-related, not reappeared since. Reserve active.",service:"PASM, Bose, heated seats, PPF, CarPlay. Fresh battery and oil May 2026.",market:"Guards Red manual 981s at this mileage trade $42-55k. Reserve is the key unknown.",reserve_status:"active",updates:[{time:"2 hours ago",text:"Seller posted cold start video. Engine starts cleanly, no smoke. DME codes have not reappeared since battery replacement."},{time:"Yesterday",text:"Paint meter readings added to gallery. All panels consistent — no prior bodywork detected."}]},
  {id:"L08",status:"live",year:2008,make:"Toyota",model:"Sequoia Platinum 4x4",type:"suv",trans:"automatic",drive:"4WD",price:9100,reserve:false,miles:96000,loc:"Yonkers, NY",url:"https://carsandbids.com",img:"https://media.carsandbids.com/cdn-cgi/image/width=2080,quality=70/7a0a3c6148108c9c64425dd85e0181fa3cccb652/photos/application/s-Az_3Gml/edit/EmqkI.jpg?t=177891456185",sam_view:"5.7L V8 Sequoia Platinum with locking center diff at $9,100 no reserve. The rust and exhaust leak are northeastern realities that need pricing in, but the platform is strong and 96k is under average for this generation.",what_i_like:"5.7L V8 with locking center diff. No reserve. 96k miles under average for this gen.",watch:"Exhaust leak not repaired. Northeastern underside rust. Two Carfax incidents.",service:"Rear brakes 2021. LED upgrades.",market:"Sequoia Platinums in cleaner condition trade $14-20k.",reserve_status:"none",updates:[]},

const history = [];

function reserveInfo(l) {
  if (l.reserve_status === "none") return { label: "No Reserve", cls: "noreserve" };
  if (l.reserve_status === "rnm") return { label: "Reserve Not Met", cls: "rnm" };
  if (l.reserve_status === "sold") return { label: "Sold", cls: "noreserve" };
  return { label: "Reserve Active", cls: "active" };
}

function showTake(id) {
  const l = LISTINGS.find(x => x.id === id);
  if (!l) return;
  const ri = reserveInfo(l);
  const updateHTML = l.updates && l.updates.length
    ? `<div class="modal-update">🟡 <strong>${l.updates[0].time}:</strong> ${l.updates[0].text}</div>` : "";
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = `<div class="modal">
    <div class="modal-handle"></div>
    <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
    <div class="modal-title">${l.year} ${l.make} ${l.model}</div>
    <div class="modal-sub">${(l.miles||0).toLocaleString()} mi · ${l.trans||''} · ${l.loc}</div>
    <div class="modal-reserve ${ri.cls}">${ri.label}</div>
    ${updateHTML}
    <div class="modal-view"><div class="modal-view-label">Sam's Current View</div>${l.sam_view}</div>
    <div class="modal-section"><div class="modal-section-label">What I Like</div><div class="modal-section-text">${l.what_i_like}</div></div>
    <div class="modal-section"><div class="modal-section-label">What I'd Watch</div><div class="modal-section-text">${l.watch}</div></div>
    <div class="modal-section"><div class="modal-section-label">Market Context</div><div class="modal-section-text">${l.market}</div></div>
  </div>`;
  overlay.addEventListener("click", e => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

function heroCard(l) {
  const ri = reserveInfo(l);
  const u = l.updates && l.updates.length ? l.updates[0] : null;
  const updateHTML = u ? `<div class="update-ticker"><div class="update-dot"></div><div class="update-text"><span class="update-time">${u.time} —</span> ${u.text}</div></div>` : "";
  return `<div class="card-hero">
    <div class="card-hero-label">Best Match</div>
    <img class="card-hero-img" src="${l.img}" alt="${l.year} ${l.make}" onerror="this.style.background='#f0f0ee'">
    <div class="card-hero-body">
      <div class="card-hero-title">${l.year} ${l.make} ${l.model}</div>
      <div class="card-hero-meta">${l.miles.toLocaleString()} mi · ${l.trans} · ${l.loc}</div>
      <div class="card-hero-price-row">
        <div class="price-wrap"><span class="price-lbl">current bid</span><span class="price-val">$${l.price.toLocaleString()}</span></div>
        <div class="badges"><span class="badge badge-live">live</span><span class="badge badge-${ri.cls === 'noreserve' ? 'noreserve' : 'reserve'}">${ri.label}</span></div>
      </div>
    </div>
    ${updateHTML}
    <div class="card-hero-actions">
      <button class="btn-primary" onclick="window.open('${l.url||'#'}','_blank')">View Auction ↗</button>
      <button class="btn-take" onclick="showTake('${l.id}')">Sam's Take</button>
    </div>
  </div>`;
}

function altCard(l, label, reason) {
  const isWarn = label.toLowerCase().includes("risk") || label.toLowerCase().includes("caution") || label.toLowerCase().includes("gamble");
  const pl = l.status === "sold" ? "sold for" : l.status === "unsold" ? "bid to" : "current bid";
  return `<div class="card-alt">
    <img class="card-alt-img" src="${l.img}" alt="${l.year} ${l.make}" onerror="this.style.background='#f0f0ee'">
    <div class="card-alt-body">
      <div class="card-alt-label ${isWarn ? 'caution' : ''}">${label}</div>
      <div class="card-alt-title">${l.year} ${l.make} ${l.model}</div>
      <div class="card-alt-reason">${reason}</div>
      <div class="card-alt-bottom">
        <span class="card-alt-price">${pl} $${l.price.toLocaleString()}</span>
        <div class="card-alt-actions">
          <button class="card-alt-action" onclick="window.open('${l.url||'#'}','_blank')">View ↗</button>
          <button class="card-alt-action" onclick="showTake('${l.id}')">Sam's Take</button>
        </div>
      </div>
    </div>
  </div>`;
}

function rnmCard(l, context) {
  return `<div class="card-rnm">
    <div><div class="card-rnm-title">${l.year} ${l.make} ${l.model}</div><div class="card-rnm-sub">${context}</div></div>
    <div class="card-rnm-right">bid to $${l.price.toLocaleString()}<br>reserve not met</div>
  </div>`;
}

function parseResults(raw) {
  const searchMatch = raw.match(/\[SEARCHING:(.*?)\]/);
  const heroMatch = raw.match(/\[HERO:(\w+)\]/);
  const altMatches = [...raw.matchAll(/\[ALT:(\w+)\|([^|]+)\|([^\]]+)\]/g)];
  const rnmMatches = [...raw.matchAll(/\[RNM:(\w+)\|([^\]]+)\]/g)];
  const chipMatch = raw.match(/\[CHIPS:(.*?)\]/);
  const searchText = searchMatch ? searchMatch[1] : null;
  const heroListing = heroMatch ? LISTINGS.find(l => l.id === heroMatch[1]) : null;
  const alts = altMatches.map(m => ({ listing: LISTINGS.find(l => l.id === m[1]), label: m[2], reason: m[3] })).filter(a => a.listing);
  const rnms = rnmMatches.map(m => ({ listing: LISTINGS.find(l => l.id === m[1]), context: m[2] })).filter(r => r.listing);
  const chips = chipMatch ? chipMatch[1].split("|").map(s => s.trim()) : [];
  const clean = raw.replace(/\[SEARCHING:.*?\]/g,"").replace(/\[HERO:.*?\]/g,"").replace(/\[ALT:.*?\]/g,"").replace(/\[RNM:.*?\]/g,"").replace(/\[CHIPS:.*?\]/g,"").trim();
  let resultsHTML = "";
  if (searchText) resultsHTML += `<div class="search-status">${searchText}</div>`;
  if (heroListing || alts.length || rnms.length) {
    resultsHTML += `<div class="results-wrap">`;
    if (heroListing) resultsHTML += heroCard(heroListing);
    if (alts.length) resultsHTML += `<div class="alt-cards">${alts.map(a => altCard(a.listing, a.label, a.reason)).join("")}</div>`;
    if (rnms.length) resultsHTML += `<div class="rnm-section"><div class="rnm-label">Also discussed — not currently available</div>${rnms.map(r => rnmCard(r.listing, r.context)).join("")}</div>`;
    resultsHTML += `</div>`;
  }
  const chipsHTML = chips.length ? `<div class="chips">${chips.map(c => `<button class="chip" onclick="handleChip('${c}')">${c}</button>`).join("")}</div>` : "";
  return { clean, resultsHTML, chipsHTML };
}

function addMsg(role, text, resultsHTML, chipsHTML) {
  const msgs = document.getElementById("msgs");
  const row = document.createElement("div");
  row.className = "row " + role;
  const inner = document.createElement("div");
  inner.className = "row-inner";
  if (role === "sam") {
    inner.innerHTML = `<div class="msg-wrap"><div class="sam-name">Sam</div><div class="sam-text">${text}</div>${chipsHTML || ""}${resultsHTML || ""}</div>`;
  } else {
    inner.innerHTML = `<div class="msg-wrap"><div class="user-bubble">${text}</div></div>`;
  }
  row.appendChild(inner);
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById("msgs");
  const row = document.createElement("div");
  row.id = "typing-row";
  row.className = "row sam";
  row.innerHTML = `<div class="row-inner"><div class="msg-wrap"><div class="typing-wrap"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div></div>`;
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}
function hideTyping() { const t = document.getElementById("typing-row"); if (t) t.remove(); }
function handleChip(text) { document.getElementById("inp").value = text; send(); }

async function send() {
  const inp = document.getElementById("inp");
  const q = inp.value.trim();
  if (!q) return;
  inp.value = ""; inp.style.height = "auto";
  document.getElementById("btn").disabled = true;
  addMsg("user", q, "", "");
  history.push({ role: "user", content: q });
  showTyping();
  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: history, system: SYS })
    });
    const data = await res.json();
    const raw = data.text || "Something went wrong.";
    const { clean, resultsHTML, chipsHTML } = parseResults(raw);
    hideTyping();
    addMsg("sam", clean, resultsHTML, chipsHTML);
    history.push({ role: "assistant", content: raw });
  } catch (e) {
    hideTyping();
    addMsg("sam", "Connection issue — try again.", "", "");
  }
  document.getElementById("btn").disabled = false;
}

document.getElementById("btn").addEventListener("click", send);
document.getElementById("inp").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});
document.getElementById("inp").addEventListener("input", function() {
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 160) + "px";
});

setTimeout(() => addMsg("sam", "Hey, what are you looking for?", "", ""), 200);
</script>
</body>
